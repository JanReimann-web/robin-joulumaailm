  <ellipse cx="32" cy="31" rx="18" ry="16" fill="url(#glow)" filter="url(#halo)"/>
  <path d="M31 20.5C25.6 23.8 19.7 24.4 14.2 21.8C14.2 14.8 20.8 11.3 26.9 13.2C29.5 14 30.6 16.7 31 20.5Z" fill="url(#left-bow)" stroke="#083344" stroke-opacity="0.48" stroke-width="1.4"/>
  <path d="M33 20.5C38.4 23.8 44.3 24.4 49.8 21.8C49.8 14.8 43.2 11.3 37.1 13.2C34.5 14 33.4 16.7 33 20.5Z" fill="url(#right-bow)" stroke="#083344" stroke-opacity="0.48" stroke-width="1.4"/>
  <rect x="27.2" y="18.4" width="9.6" height="9" rx="3.8" fill="url(#ribbon)" stroke="rgba(216,254,255,0.34)" stroke-width="1"/>
  <rect x="11" y="23.2" width="42" height="10.4" rx="4.8" fill="url(#lid)" stroke="rgba(216,254,255,0.34)" stroke-width="1.3"/>
  <path d="M12.2 29.4H51.8" fill="none" stroke="#083344" stroke-opacity="0.3" stroke-width="1.4"/>
  <rect x="13" y="29.8" width="38" height="24.2" rx="7.4" fill="url(#box)" stroke="rgba(216,254,255,0.34)" stroke-width="1.3"/>
  <path d="M31.7 30.2H18.4C15.4 30.2 13 32.6 13 35.6V46.6C13 50.7 16.3 54 20.4 54H31.7V30.2Z" fill="url(#shadow)"/>
  <rect x="29.1" y="22.8" width="5.8" height="31.2" rx="2.9" fill="url(#ribbon)"/>
  <path d="M35 23H37.8L32.7 54H31.2Z" fill="url(#sheen)" opacity="0.9"/>
  <path d="M11 23.3H53" fill="none" stroke="#d8feff" stroke-opacity="0.18" stroke-width="1.1"/>
