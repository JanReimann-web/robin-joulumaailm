<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Giftlist Studio mark</title>
  <desc id="desc">A glowing gift box with translucent ribbon and bow.</desc>
  <defs>
    <filter id="halo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.8"/>
    </filter>
    <linearGradient id="lid" x1="13" y1="21" x2="53" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="0.52" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#72f5d1"/>
    </linearGradient>
    <linearGradient id="box" x1="13" y1="28" x2="51" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="0.45" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="27" y1="22" x2="37" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d8feff"/>
      <stop offset="0.42" stop-color="#72f5d1"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="left-bow" x1="13" y1="12" x2="31" y2="26" gradientUnits="userSpaceOnUse">
